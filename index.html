<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI Signal Desk</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=IBM+Plex+Mono:wght@400;500;600&family=Newsreader:ital,opsz@1,18..40&display=swap" rel="stylesheet">
  <style>
    :root{
      --paper:#F3F4EF;--surface:#FAFAF7;--card:#FFF;--ink:#182019;--ink2:#4E584F;--ink3:#899189;
      --line:#DFE3DA;--line2:#EBEDE7;--pine:#174E39;--pine2:#E4EFE9;--lime:#CDEB8A;--amber:#E9B754;
      --orange:#D9693C;--orange2:#F7E0D5;--blue:#4C66D7;--blue2:#E4E9FF;--shadow:0 16px 45px rgba(24,32,25,.08);
      --disp:"Bricolage Grotesque",system-ui,sans-serif;--mono:"IBM Plex Mono",ui-monospace,monospace;
      --serif:"Newsreader",Georgia,serif;--body:system-ui,-apple-system,"Segoe UI",sans-serif;
    }
    *{box-sizing:border-box}html,body{margin:0}body{background:var(--paper);color:var(--ink);font:15px/1.55 var(--body);-webkit-font-smoothing:antialiased}
    button,input{font:inherit}a{color:inherit;text-decoration:none}::selection{background:#174e3920}
    .app{display:grid;grid-template-columns:272px minmax(0,1fr);min-height:100vh}
    .rail{position:sticky;top:0;height:100vh;overflow:auto;padding:24px 18px 28px;background:var(--surface);border-right:1px solid var(--line)}
    .brand{display:flex;gap:9px;align-items:center;font:600 12px/1 var(--mono);letter-spacing:.13em;text-transform:uppercase;color:var(--pine)}
    .brand b{color:var(--ink)}.status{display:flex;align-items:center;gap:7px;margin-top:8px;color:var(--ink3);font:11px var(--mono)}
    .status-dot{width:7px;height:7px;border-radius:50%;background:#2D9F68;box-shadow:0 0 0 4px rgba(45,159,104,.13)}
    .rail h3{margin:29px 10px 9px;color:var(--ink3);font:600 10px var(--mono);letter-spacing:.15em;text-transform:uppercase}
    .nav,.source-list{display:grid;gap:3px}.nav button,.source-btn{width:100%;border:0;background:transparent;text-align:left;padding:9px 11px;border-radius:9px;color:var(--ink2);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px}
    .nav button:hover,.source-btn:hover{background:var(--paper);color:var(--ink)}.nav button.on,.source-btn.on{background:var(--pine2);color:var(--pine);font-weight:700}
    .count-badge{font:10px var(--mono);color:var(--ink3);background:var(--line2);padding:2px 7px;border-radius:999px;white-space:nowrap}
    .shortlist-box{margin-top:25px;padding:15px;border:1px solid var(--line);border-radius:14px;background:var(--card)}
    .shortlist-box .label{font:600 10px var(--mono);letter-spacing:.13em;text-transform:uppercase;color:var(--ink3)}
    .shortlist-box .number{margin-top:4px;font:600 31px/1 var(--disp)}.shortlist-box .number span{font:12px var(--mono);color:var(--ink3)}
    .btn{border:0;border-radius:9px;padding:9px 11px;cursor:pointer;font:600 13px var(--disp)}.btn.primary{width:100%;margin-top:12px;background:var(--pine);color:#fff}.btn.primary:disabled{background:#E5E7E1;color:var(--ink3);cursor:default}
    .btn.secondary{width:100%;margin-top:7px;background:transparent;border:1px solid var(--line);color:var(--ink2)}
    .small-note{margin-top:10px;color:var(--ink3);font-size:11px;line-height:1.45}
    .owner{margin-top:18px;padding-top:15px;border-top:1px solid var(--line)}.owner summary{cursor:pointer;color:var(--ink3);font:500 11px var(--mono)}
    .owner-panel{display:grid;gap:8px;margin-top:10px}.owner-panel input{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:8px;background:#fff;font:12px var(--mono)}
    .owner-row{display:flex;gap:7px}.owner-row button{flex:1;padding:8px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:12px}.owner-msg{min-height:18px;color:var(--ink3);font-size:10px}
    .main{min-width:0}.topbar{position:sticky;top:0;z-index:10;padding:24px 34px 15px;background:linear-gradient(180deg,var(--paper) 78%,transparent)}
    .topbar-row{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}.topbar h1{margin:0;font:600 25px/1.1 var(--disp);letter-spacing:-.02em}.sub{margin-top:5px;color:var(--ink3);font:12px var(--mono)}
    .run-chip{padding:7px 10px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.65);color:var(--ink2);font:11px var(--mono);white-space:nowrap}
    .stats{display:flex;gap:22px;flex-wrap:wrap;margin-top:15px}.stat b{font:600 20px var(--disp)}.stat span{margin-left:5px;color:var(--ink3);font:11px var(--mono)}
    .content{padding:4px 34px 70px;max-width:1500px}.section-head{display:flex;align-items:end;justify-content:space-between;gap:16px;margin:26px 0 12px}.section-head h2{margin:0;font:600 18px var(--disp)}.section-head p{margin:0;color:var(--ink3);font:11px var(--mono)}
    .top-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.top-card{position:relative;min-height:430px;padding:19px;border:1px solid var(--line);border-radius:18px;background:var(--card);box-shadow:var(--shadow);display:flex;flex-direction:column}
    .top-card.rank-1{border-color:#AFCDAE;background:linear-gradient(155deg,#fff 55%,#EDF5E9)}.rank{position:absolute;right:15px;top:13px;font:600 44px/1 var(--disp);color:#DDE3DA}.rank-1 .rank{color:#B7D5B3}
    .meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap;color:var(--ink3);font:10px var(--mono);text-transform:uppercase;letter-spacing:.06em}.chip{padding:4px 7px;border-radius:999px;background:var(--line2);color:var(--ink2)}.chip.official{background:var(--pine2);color:var(--pine)}.chip.independent{background:var(--blue2);color:#394CA3}.chip.curated{background:#F8EACB;color:#76561D}.score{font-weight:600;color:var(--orange)}
    .top-title{margin:15px 45px 0 0;font:600 23px/1.2 var(--disp);letter-spacing:-.02em}.top-title a:hover{text-decoration:underline;text-decoration-thickness:1px;text-underline-offset:3px}
    .summary{margin-top:13px;color:var(--ink2);font-size:14px}.insight{margin-top:14px;padding:12px 13px;border-radius:12px;background:var(--paper)}.insight b{display:block;margin-bottom:4px;color:var(--pine);font:600 10px var(--mono);letter-spacing:.1em;text-transform:uppercase}.insight.angle{background:var(--orange2)}.insight.angle b{color:#9E4928}
    details.evidence{margin-top:12px;color:var(--ink3);font-size:12px}details.evidence summary{cursor:pointer;font:11px var(--mono)}details.evidence p{margin:7px 0 0}.top-actions{margin-top:auto;padding-top:15px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .open-link{color:var(--pine);font:600 12px var(--mono)}.star{border:1px solid var(--line);border-radius:8px;background:#fff;padding:6px 9px;cursor:pointer;color:var(--ink3)}.star.on{background:var(--pine);border-color:var(--pine);color:#fff}
    .scan-list{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}.scan-card{padding:15px 16px;border:1px solid var(--line);border-radius:14px;background:var(--card);display:grid;grid-template-columns:42px 1fr auto;gap:12px;align-items:start}.scan-rank{font:600 28px var(--disp);color:#C4CBC2}.scan-card h3{margin:3px 0 7px;font:600 16px/1.25 var(--disp)}.scan-card p{margin:0;color:var(--ink2);font-size:13px}.scan-card .star{align-self:start}
    .idea-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.idea{padding:18px;border:1px solid var(--line);border-radius:15px;background:#fff}.idea .eyebrow{color:var(--orange);font:600 10px var(--mono);letter-spacing:.12em;text-transform:uppercase}.idea h3{margin:9px 0 8px;font:600 18px/1.2 var(--disp)}.idea p{margin:0;color:var(--ink2);font-size:13px}.idea .why{margin-top:10px;color:var(--ink3);font-size:12px}
    .day{display:flex;align-items:center;gap:10px;margin:26px 0 7px}.day span:first-child{font:600 10px var(--mono);letter-spacing:.13em;text-transform:uppercase;color:var(--ink3)}.day span:last-child{font:10px var(--mono);color:var(--ink3);background:var(--line2);padding:2px 7px;border-radius:999px}
    .item{position:relative;padding:15px 3px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:28px minmax(0,1fr) auto;gap:13px}.kind-icon{width:24px;height:24px;border-radius:7px;background:var(--pine2);display:grid;place-items:center;color:var(--pine);font:600 10px var(--mono)}.item-body h3{margin:3px 0 7px;font:600 17px/1.27 var(--disp)}.item-body .text{color:var(--ink2);font-size:14px;white-space:pre-wrap}.item-body .item-summary{margin-top:8px;color:var(--ink2);font-size:13px}.item-body .item-summary b{color:var(--pine);font:600 10px var(--mono);letter-spacing:.08em;text-transform:uppercase;margin-right:6px}.item-meta{margin-top:8px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;color:var(--ink3);font:10px var(--mono)}.item-side{display:flex;gap:7px;align-items:start}.rank-mini{padding:4px 7px;border-radius:999px;background:var(--orange2);color:#9E4928;font:600 10px var(--mono)}
    .video-card{margin:12px 0;padding:14px;border:1px solid var(--line);border-radius:15px;background:#fff;display:grid;grid-template-columns:210px minmax(0,1fr) auto;gap:16px}.thumb{aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:var(--line2)}.thumb img{width:100%;height:100%;object-fit:cover}.video-card h3{margin:4px 0 8px;font:600 18px/1.25 var(--disp)}.full-btn{margin-top:9px;border:1px solid var(--line);background:#fff;border-radius:8px;padding:6px 9px;cursor:pointer;color:var(--pine);font:600 11px var(--mono)}
    .empty{padding:55px 20px;text-align:center;color:var(--ink3);border:1px dashed var(--line);border-radius:14px;background:rgba(255,255,255,.4)}
    .toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);opacity:0;pointer-events:none;background:var(--ink);color:#fff;padding:10px 14px;border-radius:9px;font-size:12px;transition:.2s}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:1050px){.top-grid,.idea-grid{grid-template-columns:1fr 1fr}.top-card:last-child,.idea:last-child{grid-column:1/-1}.video-card{grid-template-columns:160px minmax(0,1fr) auto}}
    @media(max-width:760px){.app{display:block}.rail{position:relative;height:auto;border-right:0;border-bottom:1px solid var(--line);padding:16px}.rail h3,.source-list,.small-note{display:none}.nav{grid-template-columns:repeat(3,1fr)}.nav button{justify-content:center;font-size:12px}.shortlist-box{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:12px;padding:0;border:0;background:transparent}.shortlist-box .label,.shortlist-box .small-note{display:none}.shortlist-box .number{font-size:16px;margin:0}.shortlist-box .btn{width:auto;margin:0}.owner{margin-top:10px}.topbar{padding:17px 15px 9px}.topbar-row{display:block}.run-chip{display:inline-block;margin-top:8px}.content{padding:2px 14px 50px}.top-grid,.scan-list,.idea-grid{grid-template-columns:1fr}.top-card:last-child,.idea:last-child{grid-column:auto}.top-card{min-height:0}.video-card{grid-template-columns:1fr}.thumb{width:100%}.video-card>.star{position:absolute;right:18px}.item{grid-template-columns:24px 1fr}.item-side{grid-column:2}.stats{gap:13px}.section-head{display:block}.section-head p{margin-top:4px}}
    @media(prefers-reduced-motion:reduce){*{transition:none!important}}
  </style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="brand">
      <svg viewBox="0 0 34 30" width="25" height="23" aria-hidden="true"><rect x="1" y="3" width="22" height="6" rx="3" fill="#174E39"/><circle cx="29" cy="6" r="4" fill="#D9693C"/><rect x="1" y="12" width="28" height="6" rx="3" fill="#174E39"/><rect x="1" y="21" width="18" height="6" rx="3" fill="#174E39" opacity=".38"/></svg>
      <span><b>AI SIGNAL</b> DESK</span>
    </div>
    <div class="status"><span class="status-dot"></span><span id="synced">加载中…</span></div>

    <h3>Today</h3>
    <div class="nav" id="nav"></div>

    <h3>Sources</h3>
    <div class="source-list" id="sources"></div>

    <div class="shortlist-box">
      <div class="label">My shortlist</div>
      <div class="number" id="shortlistCount">0 <span>picked</span></div>
      <button class="btn primary" id="compose" disabled>生成创作素材</button>
      <button class="btn secondary" id="export">导出收藏</button>
      <div class="small-note">收藏仅保存在当前浏览器；导出后可永久保存。</div>
    </div>

    <details class="owner">
      <summary>Owner tools</summary>
      <div class="owner-panel">
        <input id="githubToken" type="password" autocomplete="off" placeholder="fine-grained GitHub token">
        <div class="owner-row"><button id="saveToken">本次会话保存</button><button id="runNow">立即刷新</button></div>
        <div class="owner-msg" id="ownerMsg">Token 只存 sessionStorage，关闭标签页后清除。</div>
      </div>
    </details>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-row">
        <div><h1 id="pageTitle">今日最值得看</h1><div class="sub" id="pageSub">自动筛选，不删除任何原始内容</div></div>
        <div class="run-chip" id="runChip">等待数据</div>
      </div>
      <div class="stats" id="stats"></div>
    </header>
    <div class="content" id="content"><div class="empty">正在读取今日信号…</div></div>
  </main>
</div>
<div class="toast" id="toast"></div>
<script>
  const REPO={owner:"Yeping-Hu",repo:"ai-digest",branch:"main"};
  const $=id=>document.getElementById(id);
  const esc=s=>String(s??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
  const state={items:[],today:{topIds:[],scanIds:[],ranking:[],ideas:[],run:{}},filter:"top",saved:loadSaved(),lastVisit:Number(localStorage.getItem("ai-signal-last-visit")||0)};
  const rankingMap=()=>new Map((state.today.ranking||[]).map(x=>[x.id,x]));
  const typeLabel={official:"官方",independent:"独立分析",curated:"聚合精选",community:"社区"};

  function loadSaved(){try{return JSON.parse(localStorage.getItem("ai-signal-shortlist")||"{}")}catch{return {}}}
  function storeSaved(){localStorage.setItem("ai-signal-shortlist",JSON.stringify(state.saved));updateShortlist()}
  function toast(msg){const el=$("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),1800)}
  function dateTime(ts){return new Intl.DateTimeFormat("zh-CN",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}).format(new Date(ts))}
  function ago(ts){const parsed=typeof ts==="number"?ts:Date.parse(ts);const time=Number.isFinite(parsed)?parsed:Date.now();const h=Math.max(0,(Date.now()-time)/36e5);if(h<1)return `${Math.max(1,Math.round(h*60))} 分钟前`;if(h<24)return `${Math.round(h)} 小时前`;return `${Math.round(h/24)} 天前`}
  function dayKey(ts){return new Date(ts).toISOString().slice(0,10)}
  function dayLabel(ts){const today=dayKey(Date.now()),yesterday=dayKey(Date.now()-864e5),key=dayKey(ts);return key===today?"今天":key===yesterday?"昨天":new Intl.DateTimeFormat("zh-CN",{month:"long",day:"numeric"}).format(new Date(ts))}
  function youtubeThumb(item){const id=item.videoId||new URL(item.url).searchParams.get("v");return id?`https://i.ytimg.com/vi/${encodeURIComponent(id)}/hqdefault.jpg`:""}
  function sourceTypeChip(item){const t=item.sourceType||"community";return `<span class="chip ${esc(t)}">${esc(typeLabel[t]||t)}</span>`}
  function rankFor(id){return rankingMap().get(id)}
  function itemById(id){return state.items.find(x=>x.id===id)||state.saved[id]}
  function isSaved(id){return Boolean(state.saved[id])}
  function snapshot(item){return JSON.parse(JSON.stringify(item))}

  async function load(){
    try{
      const stamp=Date.now();
      const [archiveRes,todayRes]=await Promise.all([fetch(`data/archive.json?v=${stamp}`),fetch(`data/today.json?v=${stamp}`)]);
      const archive=archiveRes.ok?await archiveRes.json():{items:[]};
      const today=todayRes.ok?await todayRes.json():{};
      state.items=(archive.items||[]).sort((a,b)=>(b.ts||0)-(a.ts||0));
      state.today={topIds:[],scanIds:[],ranking:[],ideas:[],run:{},...today};
      buildRail();updateHeader();render();
      localStorage.setItem("ai-signal-last-visit",String(Date.now()));
    }catch(err){$("content").innerHTML=`<div class="empty">读取数据失败：${esc(err.message)}</div>`}
  }

  function navDefinitions(){
    const todayIds=new Set(state.today.newIds||[]);
    return [
      ["top","★ 今日 Top",(state.today.topIds||[]).length],
      ["scan","值得扫一眼",(state.today.scanIds||[]).length],
      ["today","今天全部新内容",todayIds.size],
      ["official","官方来源",state.items.filter(x=>x.sourceType==="official").length],
      ["independent","独立分析",state.items.filter(x=>x.sourceType==="independent").length],
      ["curated","聚合精选",state.items.filter(x=>x.sourceType==="curated").length],
      ["youtube","YouTube",state.items.filter(x=>x.kind==="youtube").length],
      ["hot-x","Hot on X",state.items.filter(x=>x.kind==="x"&&Number(x.likes||0)>=500).length],
      ["shortlist","我的 Shortlist",Object.keys(state.saved).length],
      ["all","全部 30 天",state.items.length],
    ];
  }

  function buildRail(){
    $("nav").innerHTML=navDefinitions().map(([id,label,n])=>`<button data-filter="${id}" class="${state.filter===id?"on":""}"><span>${label}</span><span class="count-badge">${n}</span></button>`).join("");
    $("nav").querySelectorAll("button").forEach(btn=>btn.onclick=()=>setFilter(btn.dataset.filter));
    const counts={};state.items.forEach(x=>{const group=x.sourceGroup||x.source;counts[group]=(counts[group]||0)+1});
    $("sources").innerHTML=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([name,n])=>`<button class="source-btn ${state.filter===`source:${name}`?"on":""}" data-source="${esc(name)}"><span>${esc(name)}</span><span class="count-badge">${n}</span></button>`).join("");
    $("sources").querySelectorAll("button").forEach(btn=>btn.onclick=()=>setFilter(`source:${btn.dataset.source}`));
    updateShortlist();
  }

  function setFilter(filter){state.filter=filter;buildRail();updateHeader();render();window.scrollTo({top:0,behavior:"smooth"})}

  function updateHeader(){
    const labels={top:["今日最值得看","机器先筛选，你保留最终判断"],scan:["值得扫一眼","第 4–8 名，适合快速浏览"],today:["今天全部新内容","没有被 Top 选中，也不会被删除"],official:["官方来源","模型实验室与工程团队的一手发布"],independent:["独立分析","高质量个人实验与深度判断"],curated:["聚合精选","用来发现线索，创作前回到原始来源"],youtube:["YouTube","视频描述免费抓取；完整转录按需升级"],"hot-x":["Hot on X","仅作为早期线索，不替代原始来源"],shortlist:["我的 Shortlist","你的人工编辑判断"],all:["全部信号","最近 30 天完整归档"]};
    const pair=state.filter.startsWith("source:")?[state.filter.slice(7),"按来源查看"]:(labels[state.filter]||labels.top);
    $("pageTitle").textContent=pair[0];$("pageSub").textContent=pair[1];
    const run=state.today.run||{};
    $("runChip").textContent=state.today.generatedAt?`更新 ${dateTime(state.today.generatedAt)} · ${run.usedGemini?"Gemini 精排":"本地排序"}`:"等待首次运行";
    $("synced").textContent=state.today.generatedAt?`synced ${ago(state.today.generatedAt)}`:"waiting for first run";
    $("stats").innerHTML=[
      [state.today.newCount||0,"今日新增"],[(state.today.topIds||[]).length,"Top"],[(state.today.ideas||[]).length,"创作候选"],[state.items.length,"30天归档"]
    ].map(([v,l])=>`<div class="stat"><b>${v}</b><span>${l}</span></div>`).join("");
  }

  function topCard(item,index){
    if(!item)return "";const ed=item.editorial||{};const rank=rankFor(item.id)||{};
    return `<article class="top-card rank-${index+1}" data-id="${esc(item.id)}">
      <div class="rank">0${index+1}</div>
      <div class="meta">${sourceTypeChip(item)}<span>${esc(item.source)}</span><span>${ago(item.ts)}</span><span class="score">${Math.round(rank.score||item.signals?.localScore||0)}/100</span></div>
      <h2 class="top-title"><a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title||item.text)}</a></h2>
      <div class="summary">${esc(ed.summaryZh||item.summary||item.excerpt||item.text)}</div>
      <div class="insight"><b>为什么值得看</b>${esc(ed.whyItMattersZh||rank.reason||"值得进一步打开原文判断。")}</div>
      <div class="insight angle"><b>小红书切入点</b>${esc(ed.rednoteAngleZh||"先提炼一个反常识观点，再用同一个案例讲清楚。")}</div>
      ${(ed.evidenceZh||ed.uncertaintyZh)?`<details class="evidence"><summary>证据与不确定性</summary>${ed.evidenceZh?`<p><b>证据：</b>${esc(ed.evidenceZh)}</p>`:""}${ed.uncertaintyZh?`<p><b>注意：</b>${esc(ed.uncertaintyZh)}</p>`:""}</details>`:""}
      <div class="top-actions"><a class="open-link" href="${esc(item.url)}" target="_blank" rel="noopener">打开原文 ↗</a><button class="star ${isSaved(item.id)?"on":""}" data-star="${esc(item.id)}">${isSaved(item.id)?"★ 已收藏":"☆ 收藏"}</button></div>
    </article>`;
  }

  function renderTop(){
    const top=(state.today.topIds||[]).map(itemById).filter(Boolean);const scan=(state.today.scanIds||[]).map(itemById).filter(Boolean);const ideas=state.today.ideas||[];
    if(!top.length&&!scan.length)return `<div class="empty">还没有今日排名。运行一次 Daily digest 后，这里会显示 Top 内容。</div>`;
    return `${top.length?`<div class="section-head"><div><h2>今日 Top ${top.length}</h2><p>优先认真阅读</p></div></div><div class="top-grid">${top.map(topCard).join("")}</div>`:""}
      ${scan.length?`<div class="section-head"><div><h2>Worth scanning</h2><p>快速扫一眼，再决定是否收藏</p></div></div><div class="scan-list">${scan.map((item,i)=>scanCard(item,i+top.length+1)).join("")}</div>`:""}
      ${ideas.length?`<div class="section-head"><div><h2>今日创作候选</h2><p>模型提出，最终由你选择</p></div></div><div class="idea-grid">${ideas.map((idea,i)=>`<article class="idea"><div class="eyebrow">Idea 0${i+1}</div><h3>${esc(idea.workingTitle)}</h3><p>${esc(idea.angle)}</p><div class="why">${esc(idea.whyNow||"")}</div></article>`).join("")}</div>`:""}`;
  }

  function scanCard(item,rank){const ed=item.editorial||{};return `<article class="scan-card" data-id="${esc(item.id)}"><div class="scan-rank">${String(rank).padStart(2,"0")}</div><div><div class="meta">${sourceTypeChip(item)}<span>${esc(item.source)}</span><span>${ago(item.ts)}</span></div><h3><a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title||item.text)}</a></h3><p>${esc(ed.summaryZh||item.summary||item.excerpt||item.text)}</p></div><button class="star ${isSaved(item.id)?"on":""}" data-star="${esc(item.id)}">${isSaved(item.id)?"★":"☆"}</button></article>`}

  function filteredItems(){
    if(state.filter==="shortlist")return Object.values(state.saved).sort((a,b)=>(b.ts||0)-(a.ts||0));
    if(state.filter==="scan")return (state.today.scanIds||[]).map(itemById).filter(Boolean);
    if(state.filter==="today"){const ids=new Set(state.today.newIds||[]);return state.items.filter(x=>ids.has(x.id))}
    if(state.filter==="official"||state.filter==="independent"||state.filter==="curated")return state.items.filter(x=>x.sourceType===state.filter);
    if(state.filter==="youtube")return state.items.filter(x=>x.kind==="youtube");
    if(state.filter==="hot-x")return state.items.filter(x=>x.kind==="x"&&Number(x.likes||0)>=500).sort((a,b)=>(b.likes||0)-(a.likes||0));
    if(state.filter.startsWith("source:"))return state.items.filter(x=>(x.sourceGroup||x.source)===state.filter.slice(7));
    return state.items;
  }

  function genericItem(item){
    const rank=rankFor(item.id);const saved=isSaved(item.id);const meta=`${sourceTypeChip(item)}<span>${esc(item.source)}</span><span>${ago(item.ts)}</span>${item.likes?`<span>♥ ${Number(item.likes).toLocaleString()}</span>`:""}${item.views?`<span>▶ ${Number(item.views).toLocaleString()}</span>`:""}`;
    if(item.kind==="youtube")return `<article class="video-card" data-id="${esc(item.id)}"><a class="thumb" href="${esc(item.url)}" target="_blank" rel="noopener"><img loading="lazy" src="${esc(youtubeThumb(item))}" alt=""></a><div><div class="meta">${meta}</div><h3><a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title)}</a></h3><div class="item-summary">${esc(item.summary||item.excerpt||"")}</div><div class="item-meta">${item.duration?`<span>${esc(item.duration)}</span>`:""}${item.full?`<span>完整转录摘要</span>`:`<button class="full-btn" data-video="${esc(item.videoId||"")}">按需生成完整摘要</button>`}</div></div><div class="item-side">${rank?`<span class="rank-mini">#${rank.rank}</span>`:""}<button class="star ${saved?"on":""}" data-star="${esc(item.id)}">${saved?"★":"☆"}</button></div></article>`;
    return `<article class="item" data-id="${esc(item.id)}"><div class="kind-icon">${item.kind==="x"?"X":"↗"}</div><div class="item-body"><div class="meta">${meta}</div>${item.title?`<h3><a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title)}</a></h3>`:""}${item.text?`<div class="text">${esc(item.text)}</div>`:""}${item.summary?`<div class="item-summary"><b>${item.editorial?"AI digest":"Excerpt"}</b>${esc(item.summary)}</div>`:""}<div class="item-meta"><a href="${esc(item.url)}" target="_blank" rel="noopener">打开原文 ↗</a>${item.editorial?.rednoteAngleZh?`<span>· ${esc(item.editorial.rednoteAngleZh)}</span>`:""}</div></div><div class="item-side">${rank?`<span class="rank-mini">#${rank.rank}</span>`:""}<button class="star ${saved?"on":""}" data-star="${esc(item.id)}">${saved?"★":"☆"}</button></div></article>`;
  }

  function renderList(){const list=filteredItems();if(!list.length)return `<div class="empty">这个筛选下暂时没有内容。</div>`;let html="",day="";for(const item of list){const key=dayKey(item.ts||Date.now());if(key!==day){day=key;html+=`<div class="day"><span>${dayLabel(item.ts)}</span><span>${list.filter(x=>dayKey(x.ts||0)===key).length}</span></div>`}html+=genericItem(item)}return html}

  function render(){$("content").innerHTML=state.filter==="top"?renderTop():renderList();bindActions()}

  function bindActions(){
    document.querySelectorAll("[data-star]").forEach(btn=>btn.onclick=()=>{const id=btn.dataset.star;const item=itemById(id);if(!item)return;if(state.saved[id])delete state.saved[id];else state.saved[id]=snapshot(item);storeSaved();buildRail();render();});
    document.querySelectorAll("[data-video]").forEach(btn=>btn.onclick=()=>requestFullSummary(btn.dataset.video));
  }

  function updateShortlist(){const n=Object.keys(state.saved).length;$("shortlistCount").innerHTML=`${n} <span>picked</span>`;$("compose").disabled=!n;$("compose").textContent=n?`生成创作素材 (${n})`:"生成创作素材"}
  function shortlistArray(){return Object.values(state.saved).sort((a,b)=>(b.ts||0)-(a.ts||0))}

  $("compose").onclick=async()=>{const list=shortlistArray();if(!list.length)return;const text=`请基于以下英文 AI 信号，先做一次 blindspot pass，再给出 3 个适合 @Kelly的科研日常 的小红书选题。不要简单翻译新闻；每个选题说明目标读者、核心收获、主线案例、需要核实的事实和推荐视觉结构。\n\n${list.map((x,i)=>`${i+1}. ${x.title||x.text}\n来源：${x.source}\n链接：${x.url}\n摘要：${x.editorial?.summaryZh||x.summary||x.excerpt||x.text}\n推荐角度：${x.editorial?.rednoteAngleZh||""}`).join("\n\n")}`;await navigator.clipboard.writeText(text);toast("创作素材已复制")};
  $("export").onclick=()=>{const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),items:shortlistArray()},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`ai-shortlist-${dayKey(Date.now())}.json`;a.click();URL.revokeObjectURL(a.href)};

  function token(){return sessionStorage.getItem("ai-signal-gh-token")||""}
  $("githubToken").value=token();
  $("saveToken").onclick=()=>{const value=$("githubToken").value.trim();if(value)sessionStorage.setItem("ai-signal-gh-token",value);else sessionStorage.removeItem("ai-signal-gh-token");$("ownerMsg").textContent=value?"已保存到本次浏览器会话。":"已清除。"};
  async function dispatch(workflow,inputs={}){const t=token()||$("githubToken").value.trim();if(!t){$("ownerMsg").textContent="请先输入 fine-grained token。";return false}const res=await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.repo}/actions/workflows/${workflow}/dispatches`,{method:"POST",headers:{Authorization:`Bearer ${t}`,Accept:"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28","Content-Type":"application/json"},body:JSON.stringify({ref:REPO.branch,inputs})});if(!res.ok)throw new Error(`${res.status} ${await res.text()}`);return true}
  $("runNow").onclick=async()=>{try{$("ownerMsg").textContent="正在触发…";await dispatch("daily.yml");$("ownerMsg").textContent="已触发 Daily digest，稍后刷新页面。"}catch(e){$("ownerMsg").textContent=`触发失败：${e.message}`}}
  async function requestFullSummary(videoId){if(!videoId){toast("找不到视频 ID");return}try{await dispatch("summarize-one.yml",{videoId});toast("已提交完整摘要任务")}catch(e){toast(`提交失败：${e.message}`)}}

  load();
</script>
</body>
</html>
