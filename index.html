      <span><b>AI SIGNAL</b> DESK</span>
    </div>
    <div class="status"><span class="status-dot"></span><span id="synced">loading…</span></div>

    <h3>Today</h3>
    <div class="nav" id="nav"></div>

    <h3>Sources</h3>
    <div class="source-list" id="sources"></div>

    <div class="shortlist-box">
      <div class="label">My shortlist</div>
      <div class="number" id="shortlistCount">0 <span>picked</span></div>
      <button class="btn primary" id="compose" disabled>Compose post</button>
      <button class="btn secondary" id="export">Export shortlist</button>
      <div class="small-note">Saved only in this browser. Export any time for a permanent copy.</div>
    </div>

    <div class="owner">
      <button class="owner-toggle" id="ownerToggle">⚙ Owner mode</button>
      <div class="owner-panel" id="ownerPanel" hidden>
        <input id="githubToken" type="password" autocomplete="off" placeholder="repo-scoped GitHub token">
        <div class="owner-row"><button id="saveToken">Save</button><button id="clearToken" hidden>Turn off</button></div>
        <div class="owner-msg" id="ownerMsg"></div>
      </div>
    </div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-row">
        <div>
          <h1 id="pageTitle">Today's Top</h1>
          <div class="sub" id="pageSub">Daily editorial ranking; you keep the final judgment.</div>
          <div class="top-tabs" id="topTabs" hidden><button data-top-view="today" class="on">Today</button><button data-top-view="archive">Top Archive</button></div>
        </div>
        <div class="run-chip" id="runChip">waiting for data</div>
      </div>
      <div class="stats" id="stats"></div>
    </header>
    <div class="content" id="content"><div class="empty">Loading today's signal…</div></div>
  </main>
</div>
<div class="reader-overlay" id="readerOverlay" hidden>
  <button class="reader-backdrop" data-reader-close aria-label="Close reader"></button>
  <section class="reader-panel" role="dialog" aria-modal="true" aria-labelledby="readerTitle">
    <button class="reader-close" data-reader-close aria-label="Close reader">×</button>
    <div id="readerContent"></div>
  </section>
</div>
<div class="toast" id="toast"></div>
<script>
  const REPO={owner:"Yeping-Hu",repo:"ai-digest",branch:"main"};
  const $=id=>document.getElementById(id);
  const esc=s=>String(s??"").replace(/[&<>'"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;",'"':"&quot;"}[c]));
  const state={items:[],today:{topIds:[],scanIds:[],ranking:[],ideas:[],run:{}},history:{days:[]},filter:"top",topView:"today",saved:loadSaved(),reader:null};
  const typeLabel={official:"Official",independent:"Independent",curated:"Curated",community:"Community"};
  let OWNER=false;

  function loadSaved(){try{return JSON.parse(localStorage.getItem("ai-signal-shortlist")||"{}")}catch{return {}}}
  function storeSaved(){localStorage.setItem("ai-signal-shortlist",JSON.stringify(state.saved));updateShortlist()}
  function getToken(){return localStorage.getItem("gh_token")||localStorage.getItem("ai-signal-gh-token")||""}
  function setToken(value){if(value){localStorage.setItem("gh_token",value);localStorage.removeItem("ai-signal-gh-token")}else{localStorage.removeItem("gh_token");localStorage.removeItem("ai-signal-gh-token")}OWNER=Boolean(value)}
  function toast(msg){const el=$("toast");el.textContent=msg;el.classList.add("show");setTimeout(()=>el.classList.remove("show"),2200)}
  function dateTime(ts){return new Intl.DateTimeFormat("en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"}).format(new Date(ts))}
  function parseTime(value){
    if(typeof value==="number")return Number.isFinite(value)?value:NaN;
    const raw=String(value??"").trim();
    if(!raw)return NaN;
    const dateOnly=raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if(dateOnly){const local=new Date(Number(dateOnly[1]),Number(dateOnly[2])-1,Number(dateOnly[3]),12,0,0,0);return local.getTime()}
    const parsed=Date.parse(raw);return Number.isFinite(parsed)?parsed:NaN;
  }
  function ago(ts){const parsed=parseTime(ts);const time=Number.isFinite(parsed)?parsed:Date.now();const h=Math.max(0,(Date.now()-time)/36e5);if(h<1)return `${Math.max(1,Math.round(h*60))} min ago`;if(h<24)return `${Math.round(h)}h ago`;return `${Math.round(h/24)}d ago`}
  function timeValue(value){const parsed=parseTime(value);return Number.isFinite(parsed)?parsed:Date.now()}
  function dayKey(ts){const d=new Date(timeValue(ts));const y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,"0"),day=String(d.getDate()).padStart(2,"0");return `${y}-${m}-${day}`}
  function shiftedDayKey(days){const d=new Date();d.setHours(12,0,0,0);d.setDate(d.getDate()+days);return dayKey(d)}
  function dayLabel(ts){const key=dayKey(ts);if(key===shiftedDayKey(0))return"Today";if(key===shiftedDayKey(-1))return"Yesterday";return new Intl.DateTimeFormat("en-US",{month:"long",day:"numeric",year:"numeric"}).format(new Date(timeValue(ts)))}
  function youtubeState(item){
    if(item?.kind!=="youtube")return"";
    const explicit=String(item.youtubeState||"").toLowerCase();
    if(explicit)return explicit;
    const scheduled=parseTime(item.scheduledStartTime),actualStart=parseTime(item.actualStartTime),actualEnd=parseTime(item.actualEndTime);
    if(Number.isFinite(scheduled)&&scheduled>Date.now()&&!Number.isFinite(actualStart))return"upcoming";
    if(Number.isFinite(actualStart)&&!Number.isFinite(actualEnd))return"live";
    return"";
  }
  function publishedTime(item){if(youtubeState(item)==="upcoming")return NaN;for(const value of [item?.ts,item?.publishedAt,item?.actualStartTime,item?.youtubePublishedAt,item?.published,item?.date]){const parsed=parseTime(value);if(Number.isFinite(parsed))return parsed}return NaN}
  function publishedDayKey(item){const ts=publishedTime(item);return Number.isFinite(ts)?dayKey(ts):""}
  function sortItemTime(item){const published=publishedTime(item);if(Number.isFinite(published))return published;const scheduled=parseTime(item?.scheduledStartTime);if(Number.isFinite(scheduled))return scheduled;return timeValue(item?.firstSeen)}
  function dailyNewItems(){const today=shiftedDayKey(0);return state.items.filter(item=>youtubeState(item)!=="upcoming"&&publishedDayKey(item)===today).sort((a,b)=>publishedTime(b)-publishedTime(a))}
  function formatDateKey(key,{weekday=false}={}){if(!/^\d{4}-\d{2}-\d{2}$/.test(String(key||"")))return"Unknown publication date";const [y,m,d]=key.split("-").map(Number);const local=new Date(y,m-1,d,12,0,0,0);return new Intl.DateTimeFormat("en-US",weekday?{weekday:"long",month:"long",day:"numeric",year:"numeric"}:{month:"long",day:"numeric",year:"numeric"}).format(local)}
  function formatHistoryDate(key){return formatDateKey(key,{weekday:true})}
  function publicationGroups(list){
    const groups=new Map();
    for(const item of list){const key=youtubeState(item)==="upcoming"?"__upcoming__":publishedDayKey(item)||"__unknown__";if(!groups.has(key))groups.set(key,[]);groups.get(key).push(item)}
    const priority=key=>key==="__upcoming__"?0:key==="__unknown__"?2:1;
    return [...groups.entries()].sort(([a],[b])=>{const pa=priority(a),pb=priority(b);if(pa!==pb)return pa-pb;if(a==="__upcoming__")return 0;if(a==="__unknown__")return 0;return b.localeCompare(a)}).map(([key,items])=>({key,items:items.sort((a,b)=>sortItemTime(b)-sortItemTime(a))}));
  }
  function youtubeThumb(item){try{const id=item.videoId||new URL(item.url).searchParams.get("v");return id?`https://i.ytimg.com/vi/${encodeURIComponent(id)}/hqdefault.jpg`:""}catch{return""}}
  function sourceTypeChip(item){const t=item.sourceType||"community";return `<span class="chip ${esc(t)}">${esc(typeLabel[t]||t)}</span>`}
  function scheduleLabel(value){const parsed=parseTime(value);if(!Number.isFinite(parsed))return"";return new Intl.DateTimeFormat("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}).format(new Date(parsed))}
  function scheduleReached(item){const scheduled=parseTime(item?.scheduledStartTime);return Number.isFinite(scheduled)&&scheduled<=Date.now()}
  function summaryBlock(item){
    if(item?.kind!=="youtube")return null;
    const stateName=youtubeState(item),when=scheduleLabel(item.scheduledStartTime),reached=scheduleReached(item);
    if(stateName==="upcoming"&&!reached)return{label:when?`Available after ${when}`:"Not available yet",message:when?`This video is scheduled for ${when}. A full summary will be available after it is published and a transcript exists.`:"This video has not been published yet. A full summary will be available after a transcript exists."};
    if(stateName==="live")return{label:"Available after the stream",message:"This video is live now. A full summary will be available after the stream ends and YouTube publishes a transcript."};
    if(stateName==="processing")return{label:"Transcript processing",message:"The stream has ended, but the replay or transcript is still processing. Please try again later."};
    if(item.fullSummaryStatus==="not_ready"){const retry=parseTime(item.fullSummaryRetryAt||item.scheduledStartTime);const staleUpcoming=item.fullSummaryErrorCode==="youtube_upcoming"&&Number.isFinite(retry)&&retry<=Date.now();if(!staleUpcoming)return{label:when?`Try after ${when}`:"Transcript not ready",message:item.fullSummaryMessage||"The transcript is not available yet. Please try again later."}}
    return null;
  }
  function availabilityChip(item){
    if(item?.kind!=="youtube")return"";
    const stateName=youtubeState(item),when=scheduleLabel(item.scheduledStartTime);
    if(stateName==="upcoming")return scheduleReached(item)?`<span class="availability-chip processing">Release time reached · checking availability</span>`:`<span class="availability-chip upcoming">Upcoming${when?` · ${esc(when)}`:""}</span>`;
    if(stateName==="live")return`<span class="availability-chip live">Live now</span>`;
    if(stateName==="processing")return`<span class="availability-chip processing">Replay processing</span>`;
    if(item.fullSummaryStatus==="error")return`<span class="availability-chip summary-error" title="${esc(item.fullSummaryMessage||"Full summary failed")}">Summary unavailable</span>`;
    return"";
  }
  function itemTimeLabel(item){const stateName=youtubeState(item);if(stateName==="upcoming"){const when=scheduleLabel(item.scheduledStartTime);return when?`Scheduled ${when}`:"Upcoming"}if(stateName==="live")return"Live now";if(stateName==="processing")return"Replay processing";return ago(item.ts)}
  function rankScore(entry){return Number(entry?.peakScore??entry?.score??entry?.lastScore??0)||0}
  function rankingEntries(){const rank=[...(state.today.ranking||[])].sort((a,b)=>rankScore(b)-rankScore(a)||Number(b.selectionCount||0)-Number(a.selectionCount||0)||(a.rank||999)-(b.rank||999));if(rank.length)return rank.map((entry,index)=>({...entry,rank:index+1,score:rankScore(entry),tier:"top"}));const ids=[...(state.today.topIds||[]),...(state.today.scanIds||[])];return ids.map((id,index)=>({id,rank:index+1,score:0,peakScore:0,reason:"",tier:"top"}))}
  function rankingMap(){return new Map(rankingEntries().map(x=>[x.id,x]))}
  function rankFor(id){return rankingMap().get(id)}
  function itemById(id){return state.items.find(x=>x.id===id)||state.saved[id]}
  function isSaved(id){return Boolean(state.saved[id])}
  function snapshot(item){return JSON.parse(JSON.stringify(item))}
  function syncSavedWithLive(){
    let changed=false;
    for(const id of Object.keys(state.saved)){
      const live=state.items.find(item=>item.id===id);
      if(!live)continue;
      state.saved[id]=snapshot(live);
      changed=true;
    }
    if(changed)localStorage.setItem("ai-signal-shortlist",JSON.stringify(state.saved));
  }
  function normalizeCompare(s){return String(s||"").toLowerCase().replace(/https?:\/\/\S+/g,"").replace(/[\s\p{P}\p{S}]+/gu,"")}
  function distinctText(candidate,original){const a=normalizeCompare(candidate),b=normalizeCompare(original);if(!a||!b)return Boolean(a);return a!==b&&!a.includes(b)&&!b.includes(a)}
  function displayTitle(item){
    if(item.kind!=="x")return item.title||item.text||"Untitled item";
    const title=String(item.title||"").trim(),original=String(item.text||item.excerpt||"").trim();
    if(title&&distinctText(title,original)&&title.length<=180)return title;
    return `Post by ${item.author||"an X user"}`;
  }
  function avatarUrl(item){const handle=String(item.author||"").replace(/^@/,"");return item.avatarUrl||item.profileImageUrl||(handle?`https://unavatar.io/x/${encodeURIComponent(handle)}`:"")}
  function avatarMarkup(item){const handle=String(item.author||"").replace(/^@/,"");const url=avatarUrl(item);return `<span class="x-avatar">${esc((handle[0]||"?").toUpperCase())}${url?`<img src="${esc(url)}" alt="" loading="lazy" onerror="this.remove()">`:""}</span>`}
  function richText(text){
    let safe=esc(String(text??"").replace(/\r\n?/g,"\n"));
    safe=safe.replace(/^#{1,6}\s+(.+)$/gm,'<strong class="md-heading">$1</strong>');
    safe=safe.replace(/^\*\*([^*\n]+)\*\*$/gm,'<strong class="md-heading">$1</strong>');
    safe=safe.replace(/\*\*([^*\n]+)\*\*/g,"<strong>$1</strong>");
    safe=safe.replace(/__([^_\n]+)__/g,"<strong>$1</strong>");
    safe=safe.replace(/`([^`\n]+)`/g,"<code>$1</code>");
    return safe.replace(/\n/g,"<br>");
  }
  function collapsible(text,lines=4,extra="",forceToggle=false){
    if(!text)return"";
    const raw=String(text);
    const likelyLong=forceToggle||raw.length>Math.max(260,lines*90)||(raw.match(/\n/g)||[]).length>lines;
    return `<div class="clamp-wrap ${extra}" data-likely-long="${likelyLong?"1":"0"}"><div class="clamp-text is-clamped" style="--clamp-lines:${lines}">${richText(raw)}</div><button class="more-toggle" ${likelyLong?"":"hidden"}>Show more</button></div>`;
  }
  function eligibleForFull(item){const body=String(item.excerpt||item.text||item.summary||"");if(item.kind==="youtube")return Boolean(item.videoId||String(item.id||"").startsWith("yt:"));if(item.kind==="blog")return Boolean(item.url);if(item.kind==="x")return body.length>=600;return false}
  function fullControls(item){const eligible=eligibleForFull(item);const stateBadge=item.full?`<span class="full-state">✓ Full summary generated</span>`:"";const block=summaryBlock(item);const due=item.kind==="youtube"&&youtubeState(item)==="upcoming"&&scheduleReached(item);let note="",button="";if(!item.full&&item.fullSummaryStatus==="error")note=`<span class="summary-note" title="${esc(item.fullSummaryMessage||"")}">Summary failed</span>`;if(OWNER&&eligible){button=block?`<button class="full-btn blocked" data-summary-block="${esc(block.message)}">${esc(block.label)}</button>`:`<button class="full-btn" data-summary-item="${esc(item.id)}">${item.full?"Regenerate":due?"Check availability & summarize":"Generate full summary"}</button>`}return `${stateBadge}${note}${button}`}

  async function load(){
    try{
      const stamp=Date.now();
      const [archiveRes,todayRes,historyRes]=await Promise.all([
        fetch(`data/archive.json?v=${stamp}`,{cache:"no-store"}),
        fetch(`data/today.json?v=${stamp}`,{cache:"no-store"}),
        fetch(`data/top-history.json?v=${stamp}`,{cache:"no-store"}),
      ]);
      const archive=archiveRes.ok?await archiveRes.json():{items:[]};
      const today=todayRes.ok?await todayRes.json():{};
      const history=historyRes.ok?await historyRes.json():{days:[]};
      state.items=(archive.items||[]).sort((a,b)=>sortItemTime(b)-sortItemTime(a));
      syncSavedWithLive();
      state.today={topIds:[],scanIds:[],ranking:[],ideas:[],run:{},...today};
      state.history={days:[],...history};
      setupOwner();buildRail();updateHeader();render();
    }catch(err){$("content").innerHTML=`<div class="empty">Could not load data: ${esc(err.message)}</div>`}
  }

  function navDefinitions(){
    return [
      ["top","Today's Top",rankingEntries().length],
      ["today","All New Today",dailyNewItems().length],
      ["shortlist","My Shortlist",Object.keys(state.saved).length],
      ["full","Full Summaries",state.items.filter(item=>item.full).length],
      ["all","All 30 Days",state.items.length],
    ];
  }

  function buildRail(){
    $("nav").innerHTML=navDefinitions().map(([id,label,n])=>`<button data-filter="${id}" class="${state.filter===id?"on":""}"><span>${label}</span><span class="count-badge">${n}</span></button>`).join("");
    $("nav").querySelectorAll("button").forEach(btn=>btn.onclick=()=>setFilter(btn.dataset.filter));
    const counts={};state.items.forEach(x=>{const group=x.sourceGroup||x.source;counts[group]=(counts[group]||0)+1});
    $("sources").innerHTML=Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([name,n])=>`<button class="source-btn ${state.filter===`source:${name}`?"on":""}" data-source="${esc(name)}"><span>${esc(name)}</span><span class="count-badge">${n}</span></button>`).join("");
    $("sources").querySelectorAll("button").forEach(btn=>btn.onclick=()=>setFilter(`source:${btn.dataset.source}`));
    updateShortlist();
  }

  function setFilter(filter){closeReader(false);state.filter=filter;buildRail();updateHeader();render();window.scrollTo({top:0,behavior:"smooth"})}

  function updateHeader(){
    const labels={top:["Today's Top","Daily editorial ranking; you keep the final judgment."],today:["All New Today","Items whose original publication date is today in your current timezone."],shortlist:["My Shortlist","Your own editorial judgment, always synced with the latest archive copy."],full:["Full Summaries","Every item for which you generated a detailed summary."],all:["All 30 Days","The rolling archive, grouped by each item's original publication date."]};
    const pair=state.filter.startsWith("source:")?[state.filter.slice(7),"Browse one source."]:(labels[state.filter]||labels.top);
    $("pageTitle").textContent=pair[0];$("pageSub").textContent=pair[1];
    const showTopTabs=state.filter==="top";
    $("topTabs").hidden=!showTopTabs;
    $("topTabs").style.display=showTopTabs?"":"none";
    $("topTabs").querySelectorAll("button").forEach(btn=>btn.classList.toggle("on",btn.dataset.topView===state.topView));
    const run=state.today.run||{};
    $("runChip").textContent=state.today.generatedAt?`Updated ${dateTime(state.today.generatedAt)} · ${run.usedGemini?"Gemini ranked":"Local ranking"}`:"Waiting for first run";
    $("synced").textContent=state.today.generatedAt?`synced ${ago(state.today.generatedAt)}`:"waiting for first run";
    $("stats").innerHTML=[
      [dailyNewItems().length,"published today"],[rankingEntries().length,"ranked today"],[(state.today.ideas||[]).length,"content ideas"],[state.items.length,"30-day archive"]
    ].map(([v,l])=>`<div class="stat"><b>${v}</b><span>${l}</span></div>`).join("");
  }

  function topMeta(item,rank){const author=item.kind==="x"?`<span class="author-inline">${avatarMarkup(item)}<span>${esc(item.author)}</span></span>`:`<span>${esc(item.source)}</span>`;return `${sourceTypeChip(item)}${author}<span>${esc(itemTimeLabel(item))}</span>${availabilityChip(item)}<span class="score">${Math.round(rankScore(rank)||item.signals?.localScore||0)}/100</span>`}

  function topPreview(item){const ed=item.editorial||{};if(ed.summaryZh)return ed.summaryZh;if(!item.full&&item.summary)return item.summary;return item.excerpt||item.text||item.summary||item.title||""}

  function topCard(item,rank,index,contextDate=""){
    if(!item)return"";
    const ed=item.editorial||{},rankNumber=Number(rank?.rank||index+1),score=Math.round(rankScore(rank)||item.signals?.localScore||0);
    const summary=topPreview(item);
    return `<article class="top-card rank-${rankNumber}" data-id="${esc(item.id)}" data-reader="${esc(item.id)}" data-reader-rank="${rankNumber}" data-reader-score="${score}" data-reader-date="${esc(contextDate)}" role="button" tabindex="0" aria-label="Open reader for ${esc(displayTitle(item))}">
      <div class="top-head"><div class="rank-badge">${String(rankNumber).padStart(2,"0")}</div><div class="meta">${topMeta(item,{...rank,rank:rankNumber,score})}</div></div>
      <h2 class="top-title"><a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(displayTitle(item))}</a></h2>
      <div class="summary"><div class="preview-text">${richText(summary)}</div></div>
      <div class="insight"><b>Why it matters</b><div class="insight-copy">${esc(ed.whyItMattersZh||rank?.reason||"Open the original source to judge the full context.")}</div></div>
      <div class="insight angle"><b>RedNote angle</b><div class="insight-copy">${esc(ed.rednoteAngleZh||"Extract one counter-intuitive point and explain it through a single concrete example.")}</div></div>
      <div class="reader-hint">Open reader for the full summary, evidence and notes →</div>
      <div class="top-actions"><div class="action-left"><a class="open-link" href="${esc(item.url)}" target="_blank" rel="noopener">Open original ↗</a>${fullControls(item)}</div><div class="action-right"><button class="star ${isSaved(item.id)?"on":""}" data-star="${esc(item.id)}">${isSaved(item.id)?"★ Saved":"☆ Save"}</button></div></div>
    </article>`;
  }

  function renderTodayTop(){
    const entries=rankingEntries();const ranked=entries.map(entry=>({entry,item:itemById(entry.id)})).filter(x=>x.item);const ideas=state.today.ideas||[];
    if(!ranked.length)return `<div class="empty">No ranking yet. Run Daily digest once and today's editorial list will appear here.</div>`;
    return `<div class="section-head"><div><h2>Today's Top ${ranked.length}</h2><p>Cumulative across today's runs, sorted by the highest score each item earned.</p></div></div>
      <div class="top-grid">${ranked.map((x,i)=>topCard(x.item,x.entry,i,state.today.date||"")).join("")}</div>
      ${ideas.length?`<div class="section-head"><div><h2>Content ideas</h2><p>Model-proposed; your judgment stays final.</p></div></div><div class="idea-grid">${ideas.map((idea,i)=>`<article class="idea"><div class="eyebrow">Idea ${String(i+1).padStart(2,"0")}</div><h3>${esc(idea.workingTitle)}</h3><p>${esc(idea.angle)}</p><div class="why">${esc(idea.whyNow||"")}</div></article>`).join("")}</div>`:""}`;
  }

  function historyItem(entryItem,ranking){const live=itemById(entryItem.id);return live||entryItem.snapshot||entryItem.item||entryItem}
  function renderTopArchive(){
    const days=(state.history.days||[]).slice().sort((a,b)=>String(b.date).localeCompare(String(a.date)));
    if(!days.length)return `<div class="empty">Top Archive will fill automatically after the next daily run.</div>`;
    return days.map(day=>{
      const snapshots=new Map((day.items||[]).map(item=>[item.id,item]));
      const rankings=(day.ranking||[]).slice().sort((a,b)=>rankScore(b)-rankScore(a)||Number(b.selectionCount||0)-Number(a.selectionCount||0)||(a.rank||999)-(b.rank||999)).map((rank,index)=>({...rank,rank:index+1,score:rankScore(rank),tier:"top"}));
      const cards=rankings.map((rank,index)=>{const item=itemById(rank.id)||snapshots.get(rank.id);return item?topCard(item,rank,index,day.date):""}).join("");
      return cards?`<section class="history-day"><div class="history-day-head"><h2>${esc(formatHistoryDate(day.date))}</h2><span>${rankings.length} selected</span></div><div class="history-grid">${cards}</div></section>`:"";
    }).join("")||`<div class="empty">No archived rankings yet.</div>`;
  }

  function renderTop(){return state.topView==="archive"?renderTopArchive():renderTodayTop()}

  function filteredItems(){
    if(state.filter==="shortlist")return Object.keys(state.saved).map(itemById).filter(Boolean).sort((a,b)=>(b.ts||0)-(a.ts||0));
    if(state.filter==="today")return dailyNewItems();
    if(state.filter==="full")return state.items.filter(item=>item.full).sort((a,b)=>timeValue(b.fullSummaryAt||b.ts)-timeValue(a.fullSummaryAt||a.ts));
    if(state.filter.startsWith("source:"))return state.items.filter(x=>(x.sourceGroup||x.source)===state.filter.slice(7));
    return state.items;
  }

  function itemMeta(item){return `${sourceTypeChip(item)}<span>${esc(item.source)}</span><span>${esc(itemTimeLabel(item))}</span>${availabilityChip(item)}${item.likes?`<span>♥ ${Number(item.likes).toLocaleString()}</span>`:""}${item.views?`<span>▶ ${Number(item.views).toLocaleString()}</span>`:""}`}

  function genericItem(item){
    const rank=rankFor(item.id),saved=isSaved(item.id);
    if(item.kind==="youtube"){
      const summary=item.summary||item.editorial?.summaryZh||item.excerpt||"";
      return `<article class="video-card" data-id="${esc(item.id)}"><a class="thumb" href="${esc(item.url)}" target="_blank" rel="noopener"><img loading="lazy" src="${esc(youtubeThumb(item))}" alt=""></a><div><div class="meta">${itemMeta(item)}</div><h3><a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title)}</a></h3><div class="item-summary"><span class="content-label">${item.full?"Full summary":"Chinese summary"}</span>${collapsible(summary,item.full?7:4,"",item.full)}</div><div class="item-meta">${item.duration?`<span>${esc(item.duration)}</span>`:""}<a href="${esc(item.url)}" target="_blank" rel="noopener">Watch ↗</a>${fullControls(item)}</div></div><div class="item-side">${rank?`<span class="rank-mini">#${rank.rank}</span>`:""}<button class="star ${saved?"on":""}" data-star="${esc(item.id)}">${saved?"★":"☆"}</button></div></article>`;
    }
    if(item.kind==="x"){
      const original=item.text||item.excerpt||"";const candidate=item.full?item.summary:(item.editorial?.summaryZh||item.summary||"");const translated=distinctText(candidate,original)?candidate:"";
      return `<article class="item x-item" data-id="${esc(item.id)}"><div class="kind-icon">${avatarMarkup(item)}</div><div class="item-body"><div class="x-who"><span class="x-handle">${esc(item.author)}</span>${item.subtitle?`<span class="x-role">${esc(item.subtitle)}</span>`:""}<span class="meta">${ago(item.ts)}${item.likes?` · ♥ ${Number(item.likes).toLocaleString()}`:""}</span></div><div class="text"><span class="content-label">Original post</span>${collapsible(original,5)}</div>${translated?`<div class="item-summary"><span class="content-label">${item.full?"Full summary":"Chinese summary"}</span>${collapsible(translated,item.full?7:4,"",item.full)}</div>`:""}<div class="item-meta"><a href="${esc(item.url)}" target="_blank" rel="noopener">Open on X ↗</a>${fullControls(item)}</div></div><div class="item-side">${rank?`<span class="rank-mini">#${rank.rank}</span>`:""}<button class="star ${saved?"on":""}" data-star="${esc(item.id)}">${saved?"★":"☆"}</button></div></article>`;
    }
    const summary=item.full?item.summary:(item.editorial?.summaryZh||item.summary||item.excerpt||item.text||"");
    return `<article class="item" data-id="${esc(item.id)}"><div class="kind-icon">↗</div><div class="item-body"><div class="meta">${itemMeta(item)}</div>${item.title?`<h3><a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(item.title)}</a></h3>`:""}<div class="item-summary"><span class="content-label">${item.full?"Full summary":item.editorial?"Chinese summary":"Excerpt"}</span>${collapsible(summary,item.full?7:4,"",item.full)}</div><div class="item-meta"><a href="${esc(item.url)}" target="_blank" rel="noopener">Open original ↗</a>${item.editorial?.rednoteAngleZh?`<span>· ${esc(item.editorial.rednoteAngleZh)}</span>`:""}${fullControls(item)}</div></div><div class="item-side">${rank?`<span class="rank-mini">#${rank.rank}</span>`:""}<button class="star ${saved?"on":""}" data-star="${esc(item.id)}">${saved?"★":"☆"}</button></div></article>`;
  }

  function renderArchiveOutline(list){
    const groups=publicationGroups(list);
    if(!groups.length)return `<div class="empty">No archived items yet.</div>`;
    const today=shiftedDayKey(0);
    return `<div class="archive-outline">${groups.map((group,index)=>{
      const unknown=group.key==="__unknown__",upcoming=group.key==="__upcoming__";
      const label=upcoming?"Upcoming":unknown?"Unknown publication date":formatDateKey(group.key,{weekday:true});
      const relative=upcoming?"Scheduled YouTube releases":!unknown&&group.key===today?"Published today":!unknown&&group.key===shiftedDayKey(-1)?"Published yesterday":"Original publication date";
      const open=upcoming||(!unknown&&(group.key===today||(!groups.some(g=>g.key===today)&&index===0)));
      return `<details class="archive-day ${unknown?"unknown-date":""}" ${open?"open":""}><summary><span class="archive-date">${esc(label)}<small>${esc(relative)}</small></span><span class="archive-count">${group.items.length} ${group.items.length===1?"item":"items"}</span></summary><div class="archive-items">${group.items.map(genericItem).join("")}</div></details>`;
    }).join("")}</div>`;
  }

  function renderGroupedList(list){
    const groups=publicationGroups(list);
    return groups.map(group=>{const unknown=group.key==="__unknown__",upcoming=group.key==="__upcoming__";const label=upcoming?"Upcoming":unknown?"Unknown publication date":group.key===shiftedDayKey(0)?"Today":group.key===shiftedDayKey(-1)?"Yesterday":formatDateKey(group.key);return `<div class="day"><span>${esc(label)}</span><span>${group.items.length}</span></div>${group.items.map(genericItem).join("")}`}).join("");
  }

  function renderList(){
    const list=filteredItems();
    if(!list.length){const message=state.filter==="today"?"No items were originally published today.":state.filter==="full"?"No full summaries have been generated yet.":"Nothing here yet.";return `<div class="empty">${message}</div>`}
    if(state.filter==="today")return `<div class="day"><span>Published Today</span><span>${list.length}</span></div>${list.map(genericItem).join("")}`;
    if(state.filter==="full")return `<div class="day"><span>Newest summaries first</span><span>${list.length}</span></div>${list.map(genericItem).join("")}`;
    if(state.filter==="all")return renderArchiveOutline(list);
    return renderGroupedList(list);
  }

  function openReader(itemId,rank={},contextDate=""){
    state.reader={itemId,rank:{...rank},contextDate};
    renderReader();
    bindActions();
  }
  function closeReader(renderAgain=false){state.reader=null;$("readerOverlay").hidden=true;document.body.classList.remove("reader-open");if(renderAgain)render()}
  function renderReader(){
    const overlay=$("readerOverlay"),host=$("readerContent"),context=state.reader;
    if(!context){overlay.hidden=true;document.body.classList.remove("reader-open");return}
    const item=itemById(context.itemId);if(!item){closeReader(false);return}
    const ed=item.editorial||{},rank=context.rank||rankFor(item.id)||{},rankNumber=Number(rank.rank||0),score=Math.round(rankScore(rank)||item.signals?.localScore||0);
    const original=String(item.text||item.excerpt||"").trim();
    const shortSummary=ed.summaryZh||(!item.full?item.summary:"")||item.excerpt||item.text||"";
    const fullSummary=item.full?String(item.summary||"").trim():"";
    const thumb=item.kind==="youtube"?youtubeThumb(item):"";
    host.innerHTML=`<div class="reader-head"><div class="reader-kicker">${rankNumber?`<span class="reader-rank">${String(rankNumber).padStart(2,"0")}</span>`:""}<span class="reader-context">${esc(context.contextDate?`Top · ${formatDateKey(context.contextDate)}`:"Today's Top")}</span><span class="score">${score}/100</span></div><h2 class="reader-title" id="readerTitle"><a href="${esc(item.url)}" target="_blank" rel="noopener">${esc(displayTitle(item))}</a></h2><div class="meta reader-meta">${sourceTypeChip(item)}${item.kind==="x"?`<span class="author-inline">${avatarMarkup(item)}<span>${esc(item.author)}</span></span>`:`<span>${esc(item.source)}</span>`}<span>${esc(itemTimeLabel(item))}</span>${availabilityChip(item)}</div></div>
      ${thumb?`<div class="reader-thumb"><img src="${esc(thumb)}" alt="" loading="lazy"></div>`:""}
      ${item.kind==="x"&&original?`<section class="reader-section"><h3>Original post</h3><div class="reader-copy">${richText(original)}</div></section>`:""}
      ${shortSummary&&(!fullSummary||distinctText(shortSummary,fullSummary))?`<section class="reader-section"><h3>Chinese summary</h3><div class="reader-copy">${richText(shortSummary)}</div></section>`:""}
      ${fullSummary?`<section class="reader-section"><h3>Full summary</h3><div class="reader-copy">${richText(fullSummary)}</div></section>`:""}
      <div class="reader-insights"><div class="reader-insight"><b>Why it matters</b>${esc(ed.whyItMattersZh||rank.reason||"Open the original source to judge the full context.")}</div><div class="reader-insight angle"><b>RedNote angle</b>${esc(ed.rednoteAngleZh||"Extract one counter-intuitive point and explain it through a single concrete example.")}</div>${ed.evidenceZh?`<div class="reader-insight"><b>Evidence</b>${esc(ed.evidenceZh)}</div>`:""}${ed.uncertaintyZh?`<div class="reader-insight"><b>Uncertainty</b>${esc(ed.uncertaintyZh)}</div>`:""}${ed.chineseAudienceGapZh?`<div class="reader-insight"><b>Chinese audience gap</b>${esc(ed.chineseAudienceGapZh)}</div>`:""}</div>
      <div class="reader-actions"><div class="action-left"><a class="open-link" href="${esc(item.url)}" target="_blank" rel="noopener">Open original ↗</a>${fullControls(item)}</div><button class="star ${isSaved(item.id)?"on":""}" data-star="${esc(item.id)}">${isSaved(item.id)?"★ Saved":"☆ Save"}</button></div>`;
    overlay.hidden=false;document.body.classList.add("reader-open");
  }

  function render(){$("content").innerHTML=state.filter==="top"?renderTop():renderList();renderReader();bindActions()}

  function bindActions(){
    document.querySelectorAll("[data-star]").forEach(btn=>btn.onclick=(event)=>{event.stopPropagation();const id=btn.dataset.star;const item=itemById(id);if(!item)return;if(state.saved[id])delete state.saved[id];else state.saved[id]=snapshot(item);storeSaved();buildRail();render()});
    document.querySelectorAll("[data-summary-item]").forEach(btn=>btn.onclick=(event)=>{event.stopPropagation();requestFullSummary(btn.dataset.summaryItem,btn)});
    document.querySelectorAll("[data-summary-block]").forEach(btn=>btn.onclick=(event)=>{event.stopPropagation();toast(btn.dataset.summaryBlock||"This item is not available for a full summary yet.")});
    document.querySelectorAll("[data-reader]").forEach(card=>{card.onclick=(event)=>{if(event.target.closest("a,button,input,summary"))return;openReader(card.dataset.reader,{rank:Number(card.dataset.readerRank||0),score:Number(card.dataset.readerScore||0)},card.dataset.readerDate||"")};card.onkeydown=(event)=>{if((event.key==="Enter"||event.key===" ")&&!event.target.closest("a,button,input")){event.preventDefault();openReader(card.dataset.reader,{rank:Number(card.dataset.readerRank||0),score:Number(card.dataset.readerScore||0)},card.dataset.readerDate||"")}}});
    document.querySelectorAll("[data-reader-close]").forEach(btn=>btn.onclick=()=>closeReader(false));
    document.querySelectorAll("a,button").forEach(el=>{if(el.closest("[data-reader]"))el.addEventListener("click",event=>event.stopPropagation())});
    bindClamps();
  }

  function refreshClamp(wrap){
    const text=wrap.querySelector(".clamp-text"),btn=wrap.querySelector(".more-toggle");
    if(!text||!btn)return;
    const expanded=!text.classList.contains("is-clamped");
    const shouldShow=wrap.dataset.likelyLong==="1"||text.scrollHeight>text.clientHeight+2;
    btn.hidden=!shouldShow;
    btn.textContent=expanded?"Show less":"Show more";
  }
  function bindClamps(){
    const refreshAll=()=>document.querySelectorAll(".clamp-wrap").forEach(refreshClamp);
    document.querySelectorAll(".clamp-wrap").forEach(wrap=>{
      const text=wrap.querySelector(".clamp-text"),btn=wrap.querySelector(".more-toggle");
      if(!text||!btn)return;
      text.classList.add("is-clamped");
      btn.onclick=()=>{text.classList.toggle("is-clamped");refreshClamp(wrap)};
    });
    document.querySelectorAll("details").forEach(details=>details.addEventListener("toggle",()=>{if(details.open)requestAnimationFrame(refreshAll)}));
    requestAnimationFrame(refreshAll);
    setTimeout(refreshAll,180);
    if(document.fonts?.ready)document.fonts.ready.then(refreshAll).catch(()=>{});
  }

  function updateShortlist(){const n=Object.keys(state.saved).length;$("shortlistCount").innerHTML=`${n} <span>picked</span>`;$("compose").disabled=!n;$("compose").textContent=n?`Compose post (${n})`:"Compose post"}
  function shortlistArray(){return Object.keys(state.saved).map(itemById).filter(Boolean).sort((a,b)=>(b.ts||0)-(a.ts||0))}

  $("compose").onclick=async()=>{const list=shortlistArray();if(!list.length)return;const text=`请基于以下英文 AI 信号，先做一次 blindspot pass，再给出 3 个适合 @Kelly的科研日常 的小红书选题。不要简单翻译新闻；每个选题说明目标读者、核心收获、主线案例、需要核实的事实和推荐视觉结构。\n\n${list.map((x,i)=>`${i+1}. ${x.title||x.text}\n来源：${x.source}\n链接：${x.url}\n摘要：${x.editorial?.summaryZh||x.summary||x.excerpt||x.text}\n推荐角度：${x.editorial?.rednoteAngleZh||""}`).join("\n\n")}`;await navigator.clipboard.writeText(text);toast("Post brief copied")};
  $("export").onclick=()=>{const blob=new Blob([JSON.stringify({exportedAt:new Date().toISOString(),items:shortlistArray()},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`ai-shortlist-${dayKey(Date.now())}.json`;a.click();URL.revokeObjectURL(a.href)};

  function authHeaders(token){return {Authorization:`Bearer ${token}`,Accept:"application/vnd.github+json","X-GitHub-Api-Version":"2022-11-28"}}

  async function validateOwnerToken(token){
    const res=await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.repo}/actions/workflows/summarize-one.yml`,{headers:authHeaders(token),cache:"no-store"});
    if(res.ok)return true;
    const body=await res.text().catch(()=>"");
    if(res.status===401)throw new Error("This token is invalid, expired, or revoked. Create a new fine-grained token and paste it here.");
    if(res.status===403||res.status===404)throw new Error("The token cannot access this workflow. Give it access to Yeping-Hu/ai-digest with Actions: Read and write.");
    throw new Error(`GitHub token check failed (${res.status})${body?`: ${body.slice(0,160)}`:""}`);
  }

  function setupOwner(){
    const toggle=$("ownerToggle"),panel=$("ownerPanel"),input=$("githubToken"),save=$("saveToken"),clear=$("clearToken"),msg=$("ownerMsg");
    function reflect(note=""){const t=getToken();OWNER=Boolean(t);clear.hidden=!t;input.value="";input.placeholder=t?"token verified ✓ (paste again to replace)":"fine-grained GitHub token";msg.textContent=note||(t?"Owner mode is on. The saved token was verified for this repo.":"Use a fine-grained token for Yeping-Hu/ai-digest with Actions: Read and write. Stored only in this browser.")}
    toggle.onclick=()=>{panel.hidden=!panel.hidden};
    save.onclick=async()=>{const value=input.value.trim();if(!value){reflect("Paste a token first.");return}save.disabled=true;save.textContent="Checking…";msg.textContent="Checking the token with GitHub…";try{await validateOwnerToken(value);setToken(value);reflect("Token verified. Owner mode is ready.");render()}catch(err){setToken("");reflect(err.message)}finally{save.disabled=false;save.textContent="Save"}};
    clear.onclick=()=>{setToken("");reflect("Saved token removed from this browser.");render()};
    reflect();
  }

  async function dispatch(workflow,inputs={}){
    const token=getToken();if(!token)throw new Error("Set and verify the owner token first.");
    const res=await fetch(`https://api.github.com/repos/${REPO.owner}/${REPO.repo}/actions/workflows/${workflow}/dispatches`,{method:"POST",headers:{...authHeaders(token),"Content-Type":"application/json"},body:JSON.stringify({ref:REPO.branch,inputs})});
    if(res.ok)return;
    const body=await res.text().catch(()=>"");
    if(res.status===401){setToken("");OWNER=false;throw new Error("The saved token is invalid, expired, or revoked. Open Owner mode and save a new token.")}
    if(res.status===403||res.status===404)throw new Error("The token is valid but cannot run this workflow. It needs repository access plus Actions: Read and write.");
    if(res.status===422)throw new Error("The workflow input does not match the site. Apply the owner-mode compatibility hotfix, then try again.");
    throw new Error(`GitHub returned ${res.status}${body?`: ${body.slice(0,220)}`:""}`);
  }

  async function requestFullSummary(itemId,btn){
    const current=itemById(itemId);if(!current)return;
    const block=summaryBlock(current);if(block){toast(block.message);return}
    const baseline={fullSummaryAt:current.fullSummaryAt||"",attemptAt:current.fullSummaryAttemptAt||"",status:current.fullSummaryStatus||""};
    btn.disabled=true;btn.textContent="Queuing…";
    try{await dispatch("summarize-one.yml",{videoId:itemId});btn.textContent="Generating…";toast("Full summary queued — this page will update automatically");await pollSummary(itemId,baseline,btn)}catch(err){btn.disabled=false;btn.textContent=current.full?"Regenerate":"Generate full summary";toast(`Could not start summary: ${err.message}`)}
  }

  async function pollSummary(itemId,baseline,btn){
    for(let attempt=0;attempt<30;attempt++){
      await new Promise(resolve=>setTimeout(resolve,10000));
      try{const res=await fetch(`data/archive.json?v=${Date.now()}`,{cache:"no-store"});if(!res.ok)continue;const archive=await res.json();const updated=(archive.items||[]).find(x=>x.id===itemId);if(!updated)continue;const changed=updated.full&&(!baseline.fullSummaryAt||updated.fullSummaryAt!==baseline.fullSummaryAt);const attempted=updated.fullSummaryAttemptAt&&updated.fullSummaryAttemptAt!==baseline.attemptAt;if(changed){state.items=(archive.items||[]).sort((a,b)=>sortItemTime(b)-sortItemTime(a));syncSavedWithLive();storeSaved();buildRail();updateHeader();render();toast("Full summary is ready");return}if(attempted&&["not_ready","error"].includes(updated.fullSummaryStatus)){state.items=(archive.items||[]).sort((a,b)=>sortItemTime(b)-sortItemTime(a));syncSavedWithLive();storeSaved();buildRail();updateHeader();render();toast(updated.fullSummaryMessage||"The full summary is not available yet.");return}}
      catch{}
      if(btn&&btn.isConnected)btn.textContent=`Generating… ${Math.min(99,(attempt+1)*3)}%`;
    }
    if(btn&&btn.isConnected){btn.disabled=false;btn.textContent="Still running — check Actions"}toast("The workflow is still running. No manual page refresh is required; reopen later if needed.")
  }

  $("topTabs").querySelectorAll("button").forEach(btn=>btn.onclick=()=>{closeReader(false);state.topView=btn.dataset.topView;updateHeader();render()});
  document.addEventListener("keydown",event=>{if(event.key==="Escape"&&state.reader)closeReader(false)});
  load();
</script>
</body>
</html>
