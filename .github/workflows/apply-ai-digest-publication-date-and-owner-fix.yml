      - name: Validate collector and dashboard
        shell: bash
        run: |
          set -euo pipefail
          node --check collect.mjs
          python3 - <<'PY'
          from pathlib import Path
          import re
          html = Path("index.html").read_text()
          scripts = re.findall(r"<script>([\s\S]*?)</script>", html)
          if not scripts:
              raise SystemExit("No inline dashboard script found")
          Path("/tmp/ai-digest-dashboard.js").write_text("\n".join(scripts))
          PY
          node --check /tmp/ai-digest-dashboard.js
          node tests/collector.test.mjs

      - name: Commit corrected files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html collect.mjs tests/collector.test.mjs tests/fixtures/rss.xml tests/fixtures/atom.xml
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Use original publication dates in digest views"
          git push origin HEAD:main

      - name: Request GitHub Pages rebuild
        if: success()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          code=$(curl -sS -o /tmp/pages-response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/pages/builds" || true)
          echo "Pages rebuild request returned HTTP ${code:-unknown}."
          cat /tmp/pages-response.json 2>/dev/null || true
