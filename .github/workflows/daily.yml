name: Daily digest

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/daily.yml
  schedule:
    - cron: "7 9 * * *"
      timezone: "America/Los_Angeles"
    - cron: "7 15 * * *"
      timezone: "America/Los_Angeles"
    - cron: "7 21 * * *"
      timezone: "America/Los_Angeles"
    # Lightweight YouTube lifecycle checks between the three full digest runs.
    # The 09:00, 15:00, and 21:00 hours are covered by the full digest itself.
    - cron: "37 1,3,5,7,11,13,17,19,23 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

env:
  TZ: America/Los_Angeles

jobs:
  install:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install cumulative Top, reader, article summaries, and merged YouTube lifecycle
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/ai-digest-v8
