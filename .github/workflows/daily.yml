name: Daily digest

on:
  schedule:
    - cron: "0 14 * * *"   # ~7am US Pacific. Times are UTC; adjust if you like.
  workflow_dispatch: {}      # lets you run it manually from the Actions tab

permissions:
  contents: write            # allows the bot to commit the updated archive back

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect and summarize
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: node collect.mjs

      - name: Commit updated archive
        run: |
          git config user.name "ai-digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No changes today."
          else
            git commit -m "Update digest $(date -u +%Y-%m-%d)"
            git push
          fi
