name: Summarize one video

on:
  workflow_dispatch:
    inputs:
      videoId:
        description: "YouTube video ID (the part after v= in the URL)"
        required: true

permissions:
  contents: write

concurrency:
  group: summarize-one
  cancel-in-progress: false

jobs:
  one:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Summarize the one video
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          SUMMARIZE_VIDEO_ID: ${{ inputs.videoId }}
        run: node collect.mjs
      - name: Commit the updated summary
        run: |
          git config user.name "ai-digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No change."
          else
            git commit -m "Full summary for ${{ inputs.videoId }}"
            git push
          fi
