      - name: Reconcile today's item ids
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const read = (file, fallback) => {
            try { return JSON.parse(fs.readFileSync(file, 'utf8')); }
            catch { return fallback; }
          };
          const write = (file, value) => {
            fs.mkdirSync(path.dirname(file), { recursive: true });
            fs.writeFileSync(file, JSON.stringify(value, null, 2) + '\n');
          };
          const dayKey = (value) => {
            const date = new Date(value);
            return Number.isFinite(date.getTime()) ? date.toISOString().slice(0, 10) : '';
          };

          const archivePath = 'data/archive.json';
          const todayPath = 'data/today.json';
          const archive = read(archivePath, { items: [] });
          const today = read(todayPath, {});
          const date = today.date || dayKey(today.generatedAt) || dayKey(Date.now());
          const itemIds = new Set((archive.items || []).map((item) => item.id));
          const ids = new Set((today.newIds || []).filter((id) => itemIds.has(id)));

          for (const item of archive.items || []) {
            if (item.firstSeen && dayKey(item.firstSeen) === date) ids.add(item.id);
          }

          const newIds = [...ids];
          today.date = date;
          today.newIds = newIds;
          today.newCount = newIds.length;
          write(todayPath, today);

          const dailyPath = path.join('data', 'daily', `${date}.json`);
          if (fs.existsSync(dailyPath)) {
            const daily = read(dailyPath, {});
            daily.date = date;
            daily.newIds = newIds;
            daily.newCount = newIds.length;
            write(dailyPath, daily);
          }

          console.log(`Reconciled ${newIds.length} item(s) for ${date}.`);
          NODE

      - name: Validate the update
        shell: bash
        run: |
          set -euo pipefail
          node --check collect.mjs
          node tests/collector.test.mjs
          node <<'NODE'
          const fs = require('node:fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const match = html.match(/<script>([\s\S]*?)<\/script>/);
          if (!match) throw new Error('Could not find the dashboard script.');
          new Function(match[1]);

          const required = [
            '.top-tabs[hidden]{display:none!important}',
            'function dailyNewItems()',
            '<span>Added Today</span>',
            'Token verified. Owner mode is ready.',
            'dispatch("summarize-one.yml",{videoId:itemId})',
          ];
          for (const text of required) {
            if (!html.includes(text)) throw new Error(`Missing expected fix: ${text}`);
          }
          console.log('Dashboard script and combined fixes passed.');
          NODE

      - name: Commit the update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ai-digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html collect.mjs tests data/today.json
          if [ -d data/daily ]; then git add data/daily; fi
          if git diff --staged --quiet; then
            echo "The combined fix is already installed."
          else
            git commit -m "Fix Owner mode and Today item consistency"
            git push
          fi

      - name: Request a GitHub Pages rebuild
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${{ github.repository }}/pages/builds"
