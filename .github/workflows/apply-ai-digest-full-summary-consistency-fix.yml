      - name: Validate collector and dashboard
        shell: bash
        run: |
          set -euo pipefail
          node --check collect.mjs
          python3 - <<'PYTEST'
          from pathlib import Path
          import re
          html = Path("index.html").read_text(encoding="utf-8")
          scripts = re.findall(r"<script(?:\s[^>]*)?>([\s\S]*?)</script>", html, flags=re.I)
          Path("/tmp/dashboard-inline.js").write_text("\n".join(scripts), encoding="utf-8")
          PYTEST
          node --check /tmp/dashboard-inline.js
          node tests/collector.test.mjs
          node tests/full-summary-fixes.test.mjs
          node tests/backfill-source-cache.test.mjs

      - name: Backfill original source files for existing full summaries
        shell: bash
        env:
          BACKFILL_FULL_SOURCES: "1"
          BACKFILL_YOUTUBE_SOURCES: "1"
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          GEMINI_API_KEY: ""
        run: |
          set -euo pipefail
          if ! node collect.mjs; then
            echo "::warning::Some existing source files could not be backfilled. The UI and future full-summary runs are still installed."
          fi

      - name: Commit repaired site and cached source files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add index.html collect.mjs tests
          if [ -f data/archive.json ]; then git add data/archive.json; fi
          if [ -f data/top-history.json ]; then git add data/top-history.json; fi
          if [ -d data/transcripts ]; then git add data/transcripts; fi

          if git diff --cached --quiet; then
            echo "No application changes to commit."
            exit 0
          fi

          git commit -m "Keep full summaries consistent across digest views"
          git push origin HEAD:main

      - name: Request GitHub Pages rebuild
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          status=$(curl -sS -o /tmp/pages-response.json -w "%{http_code}" \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/pages/builds" || true)
          if [ "$status" != "201" ]; then
            echo "::warning::Pages rebuild request returned HTTP $status. The committed files are still safe; Pages may rebuild on its normal schedule."
            cat /tmp/pages-response.json 2>/dev/null || true
          fi
