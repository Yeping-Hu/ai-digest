          tar -xzf /tmp/ai-digest-update.tar.gz -C /tmp/ai-digest-update
          cp -a /tmp/ai-digest-update/. "$GITHUB_WORKSPACE"/

      - name: Validate source and tests
        shell: bash
        run: |
          set -euo pipefail
          node --check collect.mjs
          node tests/collector.test.mjs
          test -f index.html
          test -f sources.json
          test -f data/today.json

      - name: Run the first collection now
        id: collect
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_MAX_CALLS: "2"
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        shell: bash
        run: node collect.mjs

      - name: Commit and push the update
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md sources.json collect.mjs index.html data tests
          if git diff --staged --quiet; then
            echo "No content changes were needed."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Add daily AI editorial radar and Top filters"
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Request a GitHub Pages rebuild
        if: steps.commit.outputs.changed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl --fail-with-body -L -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds"

      - name: Summary
        if: always()
        shell: bash
        run: |
          {
            echo "## AI Digest installer"
            echo
            echo "The prepared source, ranking, dashboard, and tests were installed."
            echo
            if [ "${{ steps.collect.outcome }}" = "success" ]; then
              echo "The first collection also completed successfully."
            else
              echo "The code was installed, but the first collection did not complete. Run **Daily digest** manually from Actions after checking its secrets."
            fi
            echo
            echo "This bootstrap workflow can remain in the repository; it only runs automatically when this file itself changes."
          } >> "$GITHUB_STEP_SUMMARY"
