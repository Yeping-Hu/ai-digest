name: YouTube availability and release tracking

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/youtube-availability.yml
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

jobs:
  install:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install the YouTube lifecycle update
