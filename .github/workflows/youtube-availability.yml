          Lv8u/y7/Lv8u/y7/Lv8u/y7/Lv8u/y7/Lv8m//v/AeAYz2gAgAIA
          PAYLOAD
          base64 -d /tmp/ai-digest-youtube-lifecycle/payload.b64 > /tmp/ai-digest-youtube-lifecycle/payload.tar.gz
          echo "207a46c0314b95283b9895faf20f9afc0139bd66728dcc7b3566e4b613c68508  /tmp/ai-digest-youtube-lifecycle/payload.tar.gz" | sha256sum -c -
          tar -xzf /tmp/ai-digest-youtube-lifecycle/payload.tar.gz -C /tmp/ai-digest-youtube-lifecycle
          cp /tmp/ai-digest-youtube-lifecycle/collect.mjs ./collect.mjs
          cp /tmp/ai-digest-youtube-lifecycle/index.html ./index.html
          rm -rf ./tests
          cp -R /tmp/ai-digest-youtube-lifecycle/tests ./tests

      - name: Validate the update
        shell: bash
        run: |
          set -euo pipefail
          node --check collect.mjs
          python3 - <<'PYTEST'
          from pathlib import Path
          import re
          html = Path('index.html').read_text()
          scripts = re.findall(r'<script(?:\s[^>]*)?>([\s\S]*?)</script>', html, re.I)
          if not scripts:
              raise SystemExit('No inline JavaScript found')
          Path('/tmp/ai-digest-inline.js').write_text('\n'.join(scripts))
          PYTEST
          node --check /tmp/ai-digest-inline.js
          for test_file in tests/*.mjs; do
            echo "Running $test_file"
            node "$test_file"
          done

      - name: Refresh current YouTube release states
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REFRESH_YOUTUBE_STATUS: "1"
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${YOUTUBE_API_KEY:-}" ]; then
            echo "YOUTUBE_API_KEY is not configured; code installation will continue without the initial refresh."
          else
            node collect.mjs
          fi

      - name: Commit the installed update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ai-digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add collect.mjs index.html tests data 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No install changes to commit."
          else
            git commit -m "Track scheduled YouTube releases"
            git push
          fi

      - name: Request a Pages rebuild
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl --silent --show-error --fail-with-body \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds" || true

  refresh:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check scheduled and live YouTube videos
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          REFRESH_YOUTUBE_STATUS: "1"
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${YOUTUBE_API_KEY:-}" ]; then
            echo "YOUTUBE_API_KEY is missing."
            exit 1
          fi
          node collect.mjs

      - name: Commit lifecycle changes only when needed
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ai-digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No YouTube lifecycle changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Refresh YouTube availability $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Request a Pages rebuild
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl --silent --show-error --fail-with-body \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages/builds" || true
