name: Apply AI Digest reader fixes (workflow-safe)

on:
  push:
    paths:
      - ".github/workflows/apply-ai-digest-v3-mobile-fixed.yml"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write
  pages: write

concurrency:
  group: apply-ai-digest-v3-fixed
  cancel-in-progress: false

