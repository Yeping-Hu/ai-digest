          PAYLOAD
          base64 --decode /tmp/ai-digest-update/payload.b64 > /tmp/ai-digest-update/payload.tar.gz
          tar -xzf /tmp/ai-digest-update/payload.tar.gz -C /tmp/ai-digest-update
          cp -a /tmp/ai-digest-update/index.html ./index.html
          cp -a /tmp/ai-digest-update/collect.mjs ./collect.mjs
          cp -a /tmp/ai-digest-update/README.md ./README.md
          cp -a /tmp/ai-digest-update/sources.json ./sources.json
          mkdir -p tests/fixtures data
          cp -a /tmp/ai-digest-update/tests/collector.test.mjs tests/collector.test.mjs
          cp -a /tmp/ai-digest-update/tests/fixtures/. tests/fixtures/
          if [ ! -f data/top-history.json ]; then
            printf '%s\n' '{"version":1,"days":[]}' > data/top-history.json
          fi

      - name: Validate the update
        shell: bash
        run: |
          set -euo pipefail
          node --check collect.mjs
          node tests/collector.test.mjs
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html','utf8');
          const match = html.match(/<script>([\s\S]*?)<\/script>\s*<\/body>/);
          if (!match) throw new Error('Could not find dashboard script');
          new Function(match[1]);
          console.log('dashboard script passed');
          NODE

      - name: Commit the update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ai-digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html collect.mjs README.md sources.json tests data/top-history.json
          if git diff --staged --quiet; then
            echo "The requested update is already installed."
          else
            git commit -m "Restore reader tools and add Top archive"
            git push
          fi

      - name: Start a fresh daily run
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run daily.yml --ref main

      - name: Request a GitHub Pages rebuild
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${{ github.repository }}/pages/builds"
