name: Daily digest

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/daily.yml
  schedule:
    - cron: "7 9 * * *"
      timezone: "America/Los_Angeles"
    - cron: "7 15 * * *"
      timezone: "America/Los_Angeles"
    - cron: "7 21 * * *"
      timezone: "America/Los_Angeles"
    # Lightweight YouTube lifecycle checks between the three full digest runs.
    # The 09:00, 15:00, and 21:00 hours are covered by the full digest itself.
    - cron: "37 1,3,5,7,11,13,17,19,23 * * *"
      timezone: "America/Los_Angeles"
  workflow_dispatch:
    inputs:
      itemId:
        description: "Optional archive item ID for an on-demand full summary; leave blank to run the full digest"
        required: false
        type: string

permissions:
  contents: write
  pages: write

concurrency:
  group: daily-digest
  cancel-in-progress: false

env:
  TZ: America/Los_Angeles

jobs:
  install:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install responsive Top cards, video reader media, and Chinese summaries
        shell: bash
