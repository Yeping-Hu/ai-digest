          PAYLOAD
          base64 --decode /tmp/ai-digest-v11/payload.b64 > /tmp/ai-digest-v11/payload.tar.gz
          tar -xzf /tmp/ai-digest-v11/payload.tar.gz -C /tmp/ai-digest-v11

          cp /tmp/ai-digest-v11/payload/collect.mjs collect.mjs
          cp /tmp/ai-digest-v11/payload/index.html index.html
          rm -rf tests scripts
          cp -R /tmp/ai-digest-v11/payload/tests tests
          cp -R /tmp/ai-digest-v11/payload/scripts scripts

      - name: Validate installed code
        shell: bash
        run: |
          set -euo pipefail
          node --check collect.mjs
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text()
          scripts = re.findall(r'<script>([\s\S]*?)</script>', html)
          Path('/tmp/ai-digest-index.js').write_text('\n'.join(scripts))
          PY
          node --check /tmp/ai-digest-index.js
          node --check scripts/repair-full-summaries-from-history.mjs
          for test in \
            tests/collector.test.mjs \
            tests/full-summary-fixes.test.mjs \
            tests/backfill-source-cache.test.mjs \
            tests/full-summary-history-recovery.test.mjs \
            tests/youtube-lifecycle.test.mjs \
            tests/daily-top-union.test.mjs \
            tests/top-reader.test.mjs \
            tests/layout-language-regression.test.mjs \
            tests/ui-initialization.test.mjs
          do
            node "$test"
          done

      - name: Commit the dashboard fix before optional network work
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ai-digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add collect.mjs index.html tests scripts
          if git diff --staged --quiet; then
            echo "Dashboard files are already current."
          else
            git commit -m "Fix Top card layout, video reader, and Chinese summaries"
            git pull --rebase origin main
            git push
          fi

      - name: Request an immediate Pages rebuild for the UI fix
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds" >/dev/null || true

      - name: Recover detailed summaries and cache non-video source text
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          node scripts/repair-full-summaries-from-history.mjs
          BACKFILL_FULL_SOURCES=1 node collect.mjs

      - name: Commit optional recovered data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ai-digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No recovered data changes."
          else
            git commit -m "Recover full-summary data"
            git pull --rebase origin main
            git push
          fi

      - name: Run the first digest with the new code
        continue-on-error: true
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_MAX_CALLS: "2"
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: node collect.mjs

      - name: Commit first refreshed data
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ai-digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No data changes from the first run."
          else
            git commit -m "Refresh digest after layout and language update"
            git pull --rebase origin main
            git push
          fi

      - name: Request a Pages rebuild
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds" >/dev/null || true

  collect:
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.itemId == '') ||
      github.event.schedule == '7 9 * * *' ||
      github.event.schedule == '7 15 * * *' ||
      github.event.schedule == '7 21 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect, refresh availability, rank, merge today's Top, and deduplicate ideas
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_MAX_CALLS: "2"
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
        run: node collect.mjs

      - name: Commit updated archive and rankings
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ai-digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No data changes this run."
          else
            git commit -m "Update digest $(TZ=America/Los_Angeles date '+%Y-%m-%d %H:%M PT')"
            git pull --rebase origin main
            git push
          fi

      - name: Request a Pages rebuild
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds" >/dev/null || true

  summarize_item:
    if: github.event_name == 'workflow_dispatch' && inputs.itemId != ''
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh availability, cache source text, and generate one full summary
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          GEMINI_MAX_CALLS: "2"
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SUPADATA_API_KEY: ${{ secrets.SUPADATA_API_KEY }}
          SUMMARIZE_ITEM_ID: ${{ inputs.itemId }}
        run: node collect.mjs

      - name: Commit the requested full summary or availability status
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ai-digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No summary or availability change was produced."
          else
            git commit -m "Full summary for ${{ inputs.itemId }}"
            git pull --rebase origin main
            git push
          fi

      - name: Request a Pages rebuild
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds" >/dev/null || true

  youtube_status:
    if: github.event_name == 'schedule' && github.event.schedule == '37 1,3,5,7,11,13,17,19,23 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Refresh scheduled, live, replay-processing, and available YouTube states
        env:
          REFRESH_YOUTUBE_STATUS: "1"
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node collect.mjs

      - name: Commit YouTube lifecycle changes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "ai-digest-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No YouTube lifecycle changes this check."
          else
            git commit -m "Refresh YouTube availability $(TZ=America/Los_Angeles date '+%Y-%m-%d %H:%M PT')"
            git pull --rebase origin main
            git push
          fi

      - name: Request a Pages rebuild
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds" >/dev/null || true

